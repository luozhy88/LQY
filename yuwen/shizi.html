        // 背景音乐合成器 (Web Audio API)，彻底解决浏览器拦截外部音频的问题
        const sound = {
            ctx: null,
            bgmInterval: null,
            isPlaying: false,

            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },

            playBGM: function() {
                if (!this.ctx) this.init();
                this.stopBGM();

                this.isPlaying = true;
                const bpm = 120;
                const beatDuration = 60 / bpm;
                let step = 0;

                // 欢快的轻音乐旋律 (利用代码自动弹奏)
                const melodyPattern = [
                    { note: 74, dur: 0.5 }, { note: 78, dur: 0.5 }, { note: 81, dur: 0.5 }, { note: 74, dur: 0.5 },
                    { note: 69, dur: 0.5 }, { note: 73, dur: 0.5 }, { note: 76, dur: 0.5 }, { note: 69, dur: 0.5 },
                    { note: 71, dur: 0.5 }, { note: 74, dur: 0.5 }, { note: 78, dur: 0.5 }, { note: 71, dur: 0.5 },
                    { note: 67, dur: 0.5 }, { note: 71, dur: 0.5 }, { note: 74, dur: 0.5 }, { note: 67, dur: 0.5 },
                ];

                this.bgmInterval = setInterval(() => {
                    if(this.ctx.state !== 'running') return;
                    
                    const noteData = melodyPattern[step % melodyPattern.length];
                    const freq = 440 * Math.pow(2, (noteData.note - 69) / 12);
                    
                    this.playPianoNote(freq, noteData.dur * beatDuration);
                    
                    if (step % 4 === 0) {
                        const bassFreq = freq / 4; 
                        this.playPianoNote(bassFreq, 1.0, 0.05); 
                    }

                    step++;
                }, beatDuration * 1000 * 0.5); 
            },

            playPianoNote: function(freq, duration, volume = 0.03) { // 音量调小不影响文字发音
                const osc = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator(); 
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc2.type = 'triangle'; 
                
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc2.frequency.setValueAtTime(freq * 2, this.ctx.currentTime); 
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(volume, this.ctx.currentTime + 0.02); 
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration + 0.5); 
                
                osc.connect(gain);
                const gain2 = this.ctx.createGain();
                gain2.gain.value = 0.3; 
                osc2.connect(gain2);
                gain2.connect(gain);

                gain.connect(this.ctx.destination);
                
                osc.start();
                osc2.start();
                osc.stop(this.ctx.currentTime + duration + 1);
                osc2.stop(this.ctx.currentTime + duration + 1);
            },

            stopBGM: function() {
                this.isPlaying = false;
                if(this.bgmInterval) clearInterval(this.bgmInterval);
            }
        };

            '喜': ['😄', '🥰'], '欢': ['🎉', '😊'], '怒': ['😡', '😤'], '哀': ['😭', '🥀'], '怕': ['😨', '👻'], '惊': ['😲', '😱'], '急': ['😰', '🏃']
        };

        const { pinyin } = pinyinPro; // 引入 pinyin-pro 库

        const app = {
            chars: [], // 当前学习的汉字数组
            currentIndex: 0,
            currentImageIndex: 0,
            quizType: null, // 'image' 或 'pinyin'
            score: 0,
            currentMode: null, // 记录当前是在 'learn' 还是 'quiz' 模式
            
            // 全局背景音乐状态
            bgmInitialized: false,
            
            // 初始化
            init() {
                document.getElementById('btn-home-back').addEventListener('click', () => this.goHome());
                
                // 初始化分阶段课文数据
                this.initLessons();

                // 监听第一次用户交互，顺畅开启合成音乐
                const startAudioOnInteraction = () => {
                    if (!this.bgmInitialized) {
                        this.bgmInitialized = true;
                        sound.init(); // 初始化音频上下文
                        sound.playBGM(); // 开始播放程序合成的音乐
                        
                        document.getElementById('btn-bgm').innerText = '🎵';
                        document.getElementById('btn-bgm').classList.remove('opacity-50');
                        
                        // 触发一次后即可移除监听
                        document.removeEventListener('click', startAudioOnInteraction);
                        document.removeEventListener('touchstart', startAudioOnInteraction);
                    }
                };
                
                document.addEventListener('click', startAudioOnInteraction);
                document.addEventListener('touchstart', startAudioOnInteraction);
            },

            // 背景音乐切换
            toggleBGM() {
                this.bgmInitialized = true; // 标记已交互
                const btn = document.getElementById('btn-bgm');
                
                if (!sound.isPlaying) {
                    sound.playBGM();
                    btn.innerText = '🎵';
                    btn.classList.remove('opacity-50');
                } else {
                    sound.stopBGM();
                    btn.innerText = '🔇';
                    btn.classList.add('opacity-50');
                }
            },

            // --- 响应修改字数 ---
            updateGroupSize() {
                let val = parseInt(document.getElementById('chars-per-level').value);
                if (isNaN(val) || val < 5) val = 5; // 限制最少 5 个字
                if (val > 100) val = 100; // 限制最多 100 个字
                document.getElementById('chars-per-level').value = val;
                
                // 动态更新提示文字
                document.getElementById('hint-text').innerText = `每次 ${val} 个字左右，保护眼睛不劳累！如果觉得太难，可以手动删掉几个字哦。`;
                
                this.initLessons(); // 重新生成关卡
            },

            // --- 分阶段分组逻辑 ---
            initLessons() {
                // 1. 去掉重复的字，确保每个字只学一次
                const uniqueChars = [...new Set(allCharsStr.match(/[\u4e00-\u9fa5]/g))];
                
                // 2. 获取用户设置的每关字数
                const groupSize = parseInt(document.getElementById('chars-per-level').value) || 15; 
                
                const selectEl = document.getElementById('lesson-select');
                selectEl.innerHTML = ''; // 清空下拉框
                
                // 3. 按照每组自定义字数进行切分并生成下拉选项
                for (let i = 0; i < uniqueChars.length; i += groupSize) {
                    const charsInGroup = uniqueChars.slice(i, i + groupSize).join('');
                    const option = document.createElement('option');
                    option.value = charsInGroup;
                    const endNum = Math.min(i + groupSize, uniqueChars.length);
                    option.innerText = `第 ${Math.floor(i / groupSize) + 1} 关 (进度 ${i + 1}~${endNum} 字)`;
                    selectEl.appendChild(option);
                }
                
                // 4. 页面加载/修改时自动填入第一关的字
                this.changeLesson();
            },

            // 当下拉菜单切换时，更新文本框内容
            changeLesson() {
                const selectEl = document.getElementById('lesson-select');
                document.getElementById('input-chars').value = selectEl.value;
            },

            // 解析用户输入
            parseInput() {
                const text = document.getElementById('input-chars').value;
                // 提取所有的中文字符
                const regex = /[\u4e00-\u9fa5]/g;
                const matches = text.match(regex);
                if (!matches || matches.length === 0) {
                    alert("请至少输入一个汉字哦！");
                    return false;
                }
                // 去重
                this.chars = [...new Set(matches)];
                return true;
            },

            // 切换视图
            switchView(viewId) {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-learn').classList.add('hidden');
                document.getElementById('view-quiz').classList.add('hidden');
                document.getElementById('modal-success').classList.add('hidden');
                
                document.getElementById(viewId).classList.remove('hidden');
                
                // 显示/隐藏返回首页按钮
                const backBtn = document.getElementById('btn-home-back');
                if (viewId === 'view-home') {
                    backBtn.classList.add('hidden');
                } else {
                    backBtn.classList.remove('hidden');
                }
            },

            goHome() {
                this.switchView('view-home');
            },

            // ---- 学习模式逻辑 ----
            startLearning() {
                if (!this.parseInput()) return;
                this.currentMode = 'learn'; // 记录模式
                this.currentIndex = 0;
                this.currentImageIndex = 0;
                this.switchView('view-learn');
                this.renderLearnCard();
            },

            renderLearnCard() {
                const char = this.chars[this.currentIndex];
                const py = pinyin(char, { toneType: 'symbol' }); // 获取带声调的拼音
                
                document.getElementById('learn-char').innerText = char;
                document.getElementById('learn-pinyin').innerText = py;
                
                // 更新图片
                this.updateLearnImage(char);
                
                // 更新进度条
                const progress = ((this.currentIndex + 1) / this.chars.length) * 100;
                document.getElementById('learn-progress').style.width = `${progress}%`;

                // 添加卡片动画
                const card = document.getElementById('view-learn').querySelector('.bg-white');
                card.classList.remove('bounce-in');
                void card.offsetWidth; // 触发重绘
                card.classList.add('bounce-in');

                // 自动播放读音
                this.playAudio();
            },

            updateLearnImage(char) {
                let images = charDictionary[char];
                if (!images) {
                    // 如果字典里没有，显示通用的“文字”图标，避免产生错误的图片映射
                    images = ['📝', '📖', '🔤'];
                }
                
                // 确保图片索引不越界
                this.currentImageIndex = this.currentImageIndex % images.length;
                document.getElementById('learn-image').innerText = images[this.currentImageIndex];
            },

            nextImage() {
                const char = this.chars[this.currentIndex];
                let imgCount = charDictionary[char] ? charDictionary[char].length : 1;
                
                if (imgCount > 1) {
                    this.currentImageIndex = (this.currentImageIndex + 1) % imgCount;
                    this.updateLearnImage(char);
                    
                    // 添加小动画
                    const imgEl = document.getElementById('learn-image');
                    imgEl.style.transform = 'scale(0.8)';
                    setTimeout(() => { imgEl.style.transform = 'scale(1)'; }, 150);
                } else {
                    // 即使只有一张图，点击时也给个弹性反馈动画，让孩子知道自己点到了
                    const imgEl = document.getElementById('learn-image');
                    imgEl.style.transform = 'scale(0.8)';
                    setTimeout(() => { imgEl.style.transform = 'scale(1)'; }, 150);
                }
                
                // 点击图片时，同时发出这个汉字的声音
                this.playAudio();
            },

            nextChar() {
                if (this.currentIndex < this.chars.length - 1) {
                    this.currentIndex++;
                    this.currentImageIndex = 0;
                    this.renderLearnCard();
                } else {
                    this.showSuccess("所有的字都学完啦！快去测验一下吧！");
                }
            },

            prevChar() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.currentImageIndex = 0;
                    this.renderLearnCard();
                }
            },

            playAudio() {
                let charToSpeak = "";
                
                // 判断当前在哪个视图，决定读哪个字，确保声音和显示的字绝对一致
                if (!document.getElementById('view-learn').classList.contains('hidden')) {
                    charToSpeak = this.chars[this.currentIndex];
                } else if (!document.getElementById('view-quiz').classList.contains('hidden')) {
                    charToSpeak = document.getElementById('quiz-char').innerText;
                }

                if (charToSpeak && 'speechSynthesis' in window) {
                    // 取消当前正在播放的所有语音排队，防止连续点击时声音堆叠延迟
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(charToSpeak);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 0.8; // 稍微慢一点，适合小孩
                    window.speechSynthesis.speak(utterance);
                }
            },

            // ---- 测验模式逻辑 ----
            startQuiz(type) {
                if (!this.parseInput()) return;
                
                // 如果选择“看字找图”，严格过滤出字典里有明确图片的字，避免用抽象符号去出题
                let availableChars = [...this.chars];
                if (type === 'image') {
                    availableChars = availableChars.filter(c => charDictionary[c]);
                    if (availableChars.length < 4) {
                        alert("你输入的字中，能找到准确图片的具体事物太少啦（至少需要4个）。我先带你玩“看字找音”吧！");
                        this.startQuiz('pinyin');
                        return;
                    }
                }

                this.currentMode = 'quiz_' + type; // 记录模式
                this.quizType = type;
                this.currentIndex = 0;
                this.score = 0;
                
                // 打乱题目顺序 (使用过滤后的可用字集)
                this.quizSequence = [...availableChars].sort(() => Math.random() - 0.5);
                
                this.switchView('view-quiz');
                
                if (type === 'image') {
                    document.getElementById('quiz-prompt').innerText = "哪一张图是它？";
                } else {
                    document.getElementById('quiz-prompt').innerText = "它的拼音是哪个？";
                }

                this.renderQuizQuestion();
            },

            renderQuizQuestion() {
                if (this.currentIndex >= this.quizSequence.length) {
                    // 修复了文案逻辑错误
                    this.showSuccess(`太棒了！共完成 ${this.quizSequence.length} 道题，获得 ${this.score} 分！`);
                    return;
                }

                const targetChar = this.quizSequence[this.currentIndex];
                document.getElementById('quiz-char').innerText = targetChar;
                document.getElementById('quiz-score').innerText = this.score;
                document.getElementById('quiz-progress-text').innerText = `${this.currentIndex + 1}/${this.quizSequence.length}`;

                // 生成选项
                let options = [targetChar]; // 存放汉字
                
                // 找3个干扰项
                let distractors = [...this.chars].filter(c => c !== targetChar);
                distractors = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
                
                // 如果不够3个干扰项（比如总字数少），从字典里补
                if (distractors.length < 3) {
                    // 对于找图游戏，补充的干扰项也必须是字典里有图片的
                    let extraDict = Object.keys(charDictionary).filter(c => c !== targetChar && !distractors.includes(c));
                    const extras = extraDict.sort(() => Math.random() - 0.5).slice(0, 3 - distractors.length);
                    distractors.push(...extras);
                }

                options = options.concat(distractors);
                options.sort(() => Math.random() - 0.5); // 打乱选项顺序

                // 渲染选项按钮
                const optionsContainer = document.getElementById('quiz-options');
                optionsContainer.innerHTML = '';

                options.forEach(optChar => {
                    const btn = document.createElement('button');
                    // 移除了 hover 的彩色边框，防止触摸屏点击后颜色残留；加上 focus:outline-none 禁用浏览器默认高亮
                    btn.className = "bg-white border-2 border-gray-200 rounded-2xl h-32 text-[60px] flex items-center justify-center shadow-sm hover:shadow-md transition-all active:scale-95 focus:outline-none";
                    
                    // 根据测验类型显示不同内容
                    if (this.quizType === 'image') {
                        // 只从字典取真实含义图片
                        let imgs = charDictionary[optChar] || ['📝'];
                        btn.innerText = imgs[Math.floor(Math.random() * imgs.length)]; // 随机取该字的一张图
                    } else {
                        btn.className = "bg-white border-2 border-gray-200 rounded-2xl h-32 text-[40px] font-sans flex items-center justify-center shadow-sm hover:shadow-md transition-all active:scale-95 focus:outline-none";
                        btn.innerText = pinyin(optChar, { toneType: 'symbol' });
                    }

                    btn.onclick = () => this.handleQuizAnswer(optChar === targetChar, btn);
                    optionsContainer.appendChild(btn);
                });

                // 自动读题
                this.playAudio();
                
                // 动画
                document.getElementById('quiz-char').parentElement.classList.remove('bounce-in');
                void document.getElementById('quiz-char').parentElement.offsetWidth;
                document.getElementById('quiz-char').parentElement.classList.add('bounce-in');
            },

            handleQuizAnswer(isCorrect, btnEl) {
                if (isCorrect) {
                    // 答对
                    this.score += 10;
                    btnEl.classList.add('bg-green-100', 'border-green-500');
                    
                    // 撒花特效
                    confetti({
                        particleCount: 50,
                        spread: 60,
                        origin: { y: 0.8 },
                        colors: ['#22c55e', '#ec4899', '#3b82f6', '#eab308']
                    });

                    // 禁用所有按钮防止重复点击
                    const btns = document.getElementById('quiz-options').querySelectorAll('button');
                    btns.forEach(b => b.disabled = true);

                    setTimeout(() => {
                        this.currentIndex++;
                        this.renderQuizQuestion();
                    }, 1000);
                } else {
                    // 答错
                    btnEl.classList.add('shake', 'bg-red-50', 'border-red-400');
                    setTimeout(() => {
                        btnEl.classList.remove('shake');
                    }, 400);
                    
                    // 播放一个错误的音效 (简单的合成音)
                    if ('speechSynthesis' in window) {
                        const ut = new SpeechSynthesisUtterance("再想想哦");
                        ut.lang = 'zh-CN';
                        ut.rate = 1.2;
                        window.speechSynthesis.speak(ut);
                    }
                }
            },

            // 显示成功结算界面
            showSuccess(msg) {
                document.getElementById('modal-msg').innerText = msg;
                document.getElementById('modal-success').classList.remove('hidden');
                
                // 自动发送邮件报告给家长
                this.sendEmailReport(false);
                
                // 大量撒花
                const duration = 3 * 1000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#22c55e', '#ec4899', '#3b82f6', '#eab308']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#22c55e', '#ec4899', '#3b82f6', '#eab308']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            },

            // 点击按钮手动测试发送邮件
            testEmail() {
                this.currentMode = 'test';
                this.chars = ['测', '试', '邮', '件'];
                this.sendEmailReport(true);
            },

            // --- 发送邮件报告功能 (防拦截增强版 V2.0) ---
            async sendEmailReport(isTest = false) {
                const apiKey = "re_NiABrfbz_2E83piwyBWopQnzP4TvVpk7K";
                let subject = "【识字小达人】学习报告";
                let htmlContent = "";

                const charsStr = this.chars.join('、');
                const dateStr = new Date().toLocaleString('zh-CN');

                // 根据不同的模式生成不同的邮件内容
                if (this.currentMode === 'test') {
                    subject = `🛠️ 测试邮件 - API连通性检测 - ${dateStr}`;
                    htmlContent = `
                        <h2>恭喜！这是一封测试邮件！</h2>
                        <p>如果您能看到这封邮件，说明网页端的 API 请求（配合多重代理）已经完全正确且连通成功！</p>
                        <p>这证明 Cloudflare Pages 的跨域拦截问题已被成功绕过。</p>
                        <p>后续宝宝完成学习和测验后，会自动给您发送真实的成绩单，敬请期待。</p>
                    `;
                } else if (this.currentMode === 'learn') {
                    subject = `✅ 学习完成报告 - ${dateStr}`;
                    htmlContent = `
                        <h2>🎉 宝宝完成了一组认字学习！</h2>
                        <p><strong>时间：</strong>${dateStr}</p>
                        <p><strong>学习模式：</strong>认字卡片阅读</p>
                        <p><strong>本次共学习了 ${this.chars.length} 个字：</strong></p>
                        <p style="font-size: 1.5em; color: #2563eb; font-weight: bold; padding: 10px; background: #eff6ff; border-radius: 8px;">
                            ${charsStr}
                        </p>
                        <p style="color: #16a34a;">✨ 提示：可以引导宝宝进行一次测验来巩固记忆哦！</p>
                    `;
                } else {
                    const quizName = this.currentMode === 'quiz_image' ? '看字找图' : '看字找音';
                    subject = `🏆 测验成绩单 - ${dateStr}`;
                    htmlContent = `
                        <h2>🎉 宝宝完成了一次测验！</h2>
                        <p><strong>时间：</strong>${dateStr}</p>
                        <p><strong>测验类型：</strong>${quizName}</p>
                        <p><strong>本次测验总题数：</strong>${this.quizSequence.length} 题</p>
                        <p><strong>🔥 获得分数：</strong><span style="color: #ea580c; font-size: 1.8em; font-weight: bold;">${this.score}</span> 分</p>
                        <p><strong>本次复习的字库：</strong></p>
                        <p style="font-size: 1.2em; color: #4b5563; padding: 10px; background: #f3f4f6; border-radius: 8px;">
                            ${charsStr}
                        </p>
                    `;
                }

                const targetUrl = "https://api.resend.com/emails";
                
                // 【核心修复 V2.0】重构多重代理池
                // 解决 corsproxy.io 在 Cloudflare Pages 被内部防火墙当作恶意循环直接掐断的问题
                const proxies = [
                    "https://corsproxy.io/?" + encodeURIComponent(targetUrl),               // 节点1: 主节点 (在某些环境可能会被 CF 拦截)
                    "https://cors-anywhere.herokuapp.com/" + targetUrl,                     // 节点2: 强力备用代理 (可能需要临时授权)
                    targetUrl                                                               // 节点3: 直连兜底
                ];

                const payload = {
                    from: 'onboarding@resend.dev',
                    to: '479321347@qq.com',
                    subject: subject,
                    html: htmlContent
                };

                // 测试按钮加上交互等待反馈
                const testBtn = document.querySelector('button[onclick="app.testEmail()"]');
                if (isTest && testBtn) {
                    testBtn.innerText = "⏳ 正在发送中...";
                    testBtn.disabled = true;
                }

                let success = false;
                let responseData = null;
                let errorMsg = "";
                let isNetworkFetchError = false;

                // 循环尝试所有代理节点
                for (let i = 0; i < proxies.length; i++) {
                    try {
                        const res = await fetch(proxies[i], {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${apiKey}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        try {
                            responseData = await res.json();
                        } catch (e) {
                            responseData = { message: "代理返回非JSON数据格式" };
                        }

                        if (res.ok) {
                            success = true;
                            break; // 发送成功，立刻退出循环
                        } else {
                            errorMsg = responseData.message || "未知错误";
                            console.warn(`代理节点 ${i+1} 发送失败:`, errorMsg);
                        }
                    } catch (err) {
                        errorMsg = err.message;
                        console.warn(`代理节点 ${i+1} 抛出网络异常:`, errorMsg);
                        
                        // 记录是否是典型的由于拦截导致的 Failed to fetch 错误
                        if (err.name === 'TypeError' && err.message === 'Failed to fetch') {
                            isNetworkFetchError = true;
                        }

                        // 如果尝试到了 cors-anywhere，给予控制台提示
                        if (i === 1 && proxies[i].includes('cors-anywhere')) {
                            console.warn("提示：Heroku CORS 代理可能需要先在浏览器打开 https://cors-anywhere.herokuapp.com/corsdemo 获取临时授权");
                        }
                    }
                }

                // 恢复测试按钮状态
                if (isTest && testBtn) {
                    testBtn.innerText = "✉️ 测试发送邮件";
                    testBtn.disabled = false;
                }

                // 最终结果播报与精准错误诊断
                if (success) {
                    console.log("✅ 学习报告已成功自动发送:", responseData);
                    if (isTest) alert("🎉 邮件发送成功！\n请前往您的 QQ 邮箱检查（如果没有，请翻看垃圾邮件箱）。\n\nAPI 响应ID: " + responseData.id);
                } else {
                    console.error("❌ 学习报告发送失败:", errorMsg);
                    
                    if (isTest) {
                        if (isNetworkFetchError) {
                            // 针对由于广告拦截器或 CF 防火墙导致的跨域拦截，给出明确的排查建议
                            alert(
                                "⚠️ 邮件发送失败！(Failed to fetch)\n\n" +
                                "👉 原因分析：\n" +
                                "1. 您的浏览器安装了广告拦截插件（如 AdBlock/uBlock 等）或开启了隐私护盾（Brave浏览器），把发信接口当成追踪脚本拦截了。\n" +
                                "2. Cloudflare Pages 的安全机制拦截了网页发起的跨域代理请求。\n\n" +
                                "🛠️ 解决建议：\n" +
                                "请尝试【暂时关闭此页面的广告/隐私拦截插件】，然后再点一次测试发送。"
                            );
                        } else {
                            alert("⚠️ 邮件发送失败！\nAPI 拒绝了请求，最后错误原因：" + errorMsg);
                        }
                    }
                }
            }
        };

        // 启动应用
        window.onload = () => {
            app.init();
        };
    </script>
</body>
</html>
