        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
        playBGM() {
            if (!this.ctx) this.init(); this.stopBGM(); this.isPlaying = true;
            const bpm = 120, beatDur = 60 / bpm;
            let step = 0;
            const melody = [
                {n:74,d:.5},{n:78,d:.5},{n:81,d:.5},{n:74,d:.5},
                {n:69,d:.5},{n:73,d:.5},{n:76,d:.5},{n:69,d:.5},
                {n:71,d:.5},{n:74,d:.5},{n:78,d:.5},{n:71,d:.5},
                {n:67,d:.5},{n:71,d:.5},{n:74,d:.5},{n:67,d:.5},
            ];
            this.bgmInterval = setInterval(() => {
                if (this.ctx.state !== 'running') return;
                const nd = melody[step % melody.length];
                const freq = 440 * Math.pow(2, (nd.n - 69) / 12);
                this.playNote(freq, nd.d * beatDur);
                if (step % 4 === 0) this.playNote(freq / 4, 1.0, 0.05);
                step++;
            }, beatDur * 500);
        },
        playNote(freq, dur, vol = 0.03) {
            const o1 = this.ctx.createOscillator(), o2 = this.ctx.createOscillator(), g = this.ctx.createGain();
            o1.type = 'sine'; o2.type = 'triangle';
            o1.frequency.value = freq; o2.frequency.value = freq * 2;
            g.gain.setValueAtTime(0, this.ctx.currentTime);
            g.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur + 0.5);
            const g2 = this.ctx.createGain(); g2.gain.value = 0.3;
            o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(this.ctx.destination);
            o1.start(); o2.start(); o1.stop(this.ctx.currentTime + dur + 1); o2.stop(this.ctx.currentTime + dur + 1);
        },
        stopBGM() { this.isPlaying = false; if (this.bgmInterval) clearInterval(this.bgmInterval); }
    };

        '喜':['😄','🥰'],'欢':['🎉','😊'],'怒':['😡','😤'],'哀':['😭','🥀'],'怕':['😨','👻'],'惊':['😲','😱'],'急':['😰','🏃']
    };

    // 【容错防御】安全获取拼音函数。即使 CDN 断网，也不会让页面崩溃。
    function getSafePinyin(char) {
        try {
            if (typeof pinyinPro !== 'undefined' && pinyinPro.pinyin) {
                return pinyinPro.pinyin(char, { toneType: 'symbol' });
            }
        } catch (e) { console.warn("拼音库暂时不可用"); }
        return ""; // 获取不到拼音时不显示，但不阻断程序
    }

    // ===================== 邮件发送三重保障 =====================
    const emailSender = {
        async send(mode, chars, score, seqLen) {
            const charsStr = chars.join('、');
            const dateStr = new Date().toLocaleString('zh-CN');
            
            let subject = "【识字小达人】进度汇报";
            let html = "";
            let formSubmitData = {};

            if (mode === 'test') {
                subject = `🛠️ 邮件连通性测试 - ${dateStr}`;
                html = `<h2>✅ 测试成功！</h2><p>如果您收到此邮件，说明 API 正常工作，后续宝宝完成学习后会自动发送真实成绩单！</p>`;
                formSubmitData = { "系统通知": "发信通道正常工作，一切就绪。" };
            } else if (mode === 'learn') {
                subject = `✅ 认字学习完成 - ${dateStr}`;
                html = `<h2>🎉 宝宝完成了认字学习！</h2><p><b>时间：</b>${dateStr}</p><p><b>学了 ${chars.length} 个字：</b></p><p style="font-size:1.5em;color:#2563eb;font-weight:bold;padding:10px;background:#eff6ff;border-radius:8px">${charsStr}</p>`;
                formSubmitData = { "学习模式": "阅读背诵", "时间": dateStr, "学习字数": `${chars.length} 个`, "字库": charsStr };
            } else {
                const nm = mode === 'quiz_image' ? '看字找图' : '看字找音';
                subject = `🏆 识字测验成绩 - ${dateStr}`;
                html = `<h2>🎉 宝宝完成了测验！</h2><p><b>时间：</b>${dateStr}</p><p><b>类型：</b>${nm}</p><p><b>题数：</b>${seqLen || '?'} 题</p><p><b>🔥 得分：</b><span style="color:#ea580c;font-size:1.8em;font-weight:bold">${score}</span> 分</p><p style="color:#4b5563;padding:10px;background:#f3f4f6;border-radius:8px">${charsStr}</p>`;
                formSubmitData = { "测验类型": nm, "时间": dateStr, "题目数": `${seqLen} 题`, "得分": `${score} 分`, "字库": charsStr };
            }

            let lastError = "";

            // 策略 1: FormSubmit 中转 (天然无视跨域，Cloudflare Pages 首选)
            // ⚠️ 首次提交时，FormSubmit 会往目标邮箱发一封确认邮件，点击通过后即永久有效。
            try {
                console.log("📤 尝试策略 [FormSubmit]...");
                const fsRes = await fetch("https://formsubmit.co/ajax/479321347@qq.com", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({
                        _subject: subject,
                        _template: "table",
                        _captcha: "false",
                        "通知来源": "识字小达人App",
                        ...formSubmitData
                    })
                });
                if (fsRes.ok) {
                    return { ok: true, strategy: "FormSubmit 中转 (首次需去QQ邮箱点击激活链接)" };
                }
            } catch (e) { console.warn("FormSubmit 失败:", e.message); lastError = e.message; }

            // 策略 2: Resend 官方直连 (GitHub Pages 及本地首选)
            try {
                console.log("📤 尝试策略 [Resend 直连]...");
                const rsRes = await fetch("https://api.resend.com/emails", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer re_NiABrfbz_2E83piwyBWopQnzP4TvVpk7K",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        from: "onboarding@resend.dev",
                        to: "479321347@qq.com",
                        subject: subject,
                        html: html
                    })
                });
                if (rsRes.ok) return { ok: true, strategy: "Resend 直连" };
            } catch (e) { console.warn("Resend直连 失败:", e.message); lastError = e.message; }

            // 策略 3: cors.eu.org 代理 Resend (绕过浏览器强拦截)
            try {
                console.log("📤 尝试策略 [Resend 代理]...");
                const pxRes = await fetch("https://cors.eu.org/https://api.resend.com/emails", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer re_NiABrfbz_2E83piwyBWopQnzP4TvVpk7K",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        from: "onboarding@resend.dev",
                        to: "479321347@qq.com",
                        subject: subject,
                        html: html
                    })
                });
                if (pxRes.ok) return { ok: true, strategy: "Resend 代理" };
            } catch (e) { console.warn("代理 失败:", e.message); lastError = e.message; }

            return { ok: false, error: "系统所有发信通道均被拦截！原因: " + lastError };
        }
    };

    // ===================== 主应用逻辑 =====================
    const app = {
        chars: [], currentIndex: 0, currentImageIndex: 0,
        quizType: null, score: 0, currentMode: null,
        quizSequence: [], bgmInitialized: false,

        init() {
            document.getElementById('btn-home-back').addEventListener('click', () => this.goHome());
            this.initLessons();

            const startAudio = () => {
                if (!this.bgmInitialized) {
                    this.bgmInitialized = true;
                    sound.init(); sound.playBGM();
                    document.getElementById('btn-bgm').innerText = '🎵';
                    document.getElementById('btn-bgm').classList.remove('opacity-50');
                    document.removeEventListener('click', startAudio);
                    document.removeEventListener('touchstart', startAudio);
                }
            };
            document.addEventListener('click', startAudio);
            document.addEventListener('touchstart', startAudio);
        },

        toggleBGM() {
            this.bgmInitialized = true;
            const btn = document.getElementById('btn-bgm');
            if (!sound.isPlaying) { sound.playBGM(); btn.innerText = '🎵'; btn.classList.remove('opacity-50'); }
            else { sound.stopBGM(); btn.innerText = '🔇'; btn.classList.add('opacity-50'); }
        },

        updateGroupSize() {
            let v = parseInt(document.getElementById('chars-per-level').value);
            if (isNaN(v) || v < 5) v = 5; if (v > 100) v = 100;
            document.getElementById('chars-per-level').value = v;
            document.getElementById('hint-text').innerText = `每次 ${v} 个字左右，保护眼睛不劳累！如果觉得太难，可以手动删掉几个字哦。`;
            this.initLessons();
        },

        initLessons() {
            const unique = [...new Set(allCharsStr.match(/[\u4e00-\u9fa5]/g))];
            const gs = parseInt(document.getElementById('chars-per-level').value) || 15;
            const sel = document.getElementById('lesson-select');
            sel.innerHTML = '';
            for (let i = 0; i < unique.length; i += gs) {
                const chars = unique.slice(i, i + gs).join('');
                const opt = document.createElement('option');
                opt.value = chars;
                opt.innerText = `第 ${Math.floor(i/gs)+1} 关 (进度 ${i+1}~${Math.min(i+gs, unique.length)} 字)`;
                sel.appendChild(opt);
            }
            this.changeLesson();
        },

        changeLesson() {
            document.getElementById('input-chars').value = document.getElementById('lesson-select').value;
        },

        parseInput() {
            const m = document.getElementById('input-chars').value.match(/[\u4e00-\u9fa5]/g);
            if (!m || m.length === 0) { alert("请至少输入一个汉字哦！"); return false; }
            this.chars = [...new Set(m)]; return true;
        },

        switchView(id) {
            ['view-home','view-learn','view-quiz','modal-success'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-home-back').classList.toggle('hidden', id === 'view-home');
        },

        goHome() { this.switchView('view-home'); },

        startLearning() {
            if (!this.parseInput()) return;
            this.currentMode = 'learn'; this.currentIndex = 0; this.currentImageIndex = 0;
            this.switchView('view-learn'); this.renderLearnCard();
        },

        renderLearnCard() {
            const c = this.chars[this.currentIndex];
            document.getElementById('learn-char').innerText = c;
            
            // 使用容错方法获取拼音
            document.getElementById('learn-pinyin').innerText = getSafePinyin(c);
            
            this.updateLearnImage(c);
            document.getElementById('learn-progress').style.width = `${((this.currentIndex+1)/this.chars.length)*100}%`;
            const card = document.getElementById('view-learn').querySelector('.bg-white');
            card.classList.remove('bounce-in'); void card.offsetWidth; card.classList.add('bounce-in');
            this.playAudio();
        },

        updateLearnImage(c) {
            const imgs = charDictionary[c] || ['📝','📖','🔤'];
            this.currentImageIndex = this.currentImageIndex % imgs.length;
            document.getElementById('learn-image').innerText = imgs[this.currentImageIndex];
        },

        nextImage() {
            const c = this.chars[this.currentIndex];
            const cnt = charDictionary[c] ? charDictionary[c].length : 1;
            if (cnt > 1) this.currentImageIndex = (this.currentImageIndex + 1) % cnt;
            this.updateLearnImage(c);
            const el = document.getElementById('learn-image');
            el.style.transform = 'scale(0.8)'; setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
            this.playAudio();
        },

        nextChar() {
            if (this.currentIndex < this.chars.length - 1) { this.currentIndex++; this.currentImageIndex = 0; this.renderLearnCard(); }
            else this.showSuccess("所有的字都学完啦！快去测验一下吧！");
        },

        prevChar() {
            if (this.currentIndex > 0) { this.currentIndex--; this.currentImageIndex = 0; this.renderLearnCard(); }
        },

        playAudio() {
            let c = "";
            if (!document.getElementById('view-learn').classList.contains('hidden')) c = this.chars[this.currentIndex];
            else if (!document.getElementById('view-quiz').classList.contains('hidden')) c = document.getElementById('quiz-char').innerText;
            if (c && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(c);
                u.lang = 'zh-CN'; u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        },

        startQuiz(type) {
            if (!this.parseInput()) return;
            let avail = [...this.chars];
            if (type === 'image') {
                avail = avail.filter(c => charDictionary[c]);
                if (avail.length < 4) { 
                    alert("能找到准确图片的字太少（至少4个），改为“看字找音”模式！"); 
                    this.startQuiz('pinyin'); 
                    return; 
                }
            }
            this.currentMode = 'quiz_' + type; this.quizType = type;
            this.currentIndex = 0; this.score = 0;
            this.quizSequence = [...avail].sort(() => Math.random() - 0.5);
            this.switchView('view-quiz');
            document.getElementById('quiz-prompt').innerText = type === 'image' ? "哪一张图是它？" : "它的拼音是哪个？";
            this.renderQuizQuestion();
        },

        renderQuizQuestion() {
            if (this.currentIndex >= this.quizSequence.length) {
                this.showSuccess(`太棒了！共完成 ${this.quizSequence.length} 道题，获得 ${this.score} 分！`); return;
            }
            const target = this.quizSequence[this.currentIndex];
            document.getElementById('quiz-char').innerText = target;
            document.getElementById('quiz-score').innerText = this.score;
            document.getElementById('quiz-progress-text').innerText = `${this.currentIndex+1}/${this.quizSequence.length}`;

            let opts = [target];
            let dist = [...this.chars].filter(c => c !== target).sort(() => Math.random() - 0.5).slice(0, 3);
            if (dist.length < 3) {
                const extra = Object.keys(charDictionary).filter(c => c !== target && !dist.includes(c)).sort(() => Math.random() - 0.5).slice(0, 3 - dist.length);
                dist.push(...extra);
            }
            opts = opts.concat(dist).sort(() => Math.random() - 0.5);

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            opts.forEach(oc => {
                const btn = document.createElement('button');
                if (this.quizType === 'image') {
                    btn.className = "bg-white border-2 border-gray-200 rounded-2xl h-32 text-[60px] flex items-center justify-center shadow-sm hover:shadow-md transition-all active:scale-95 focus:outline-none";
                    const imgs = charDictionary[oc] || ['📝'];
                    btn.innerText = imgs[Math.floor(Math.random() * imgs.length)];
                } else {
                    btn.className = "bg-white border-2 border-gray-200 rounded-2xl h-32 text-[40px] font-sans flex items-center justify-center shadow-sm hover:shadow-md transition-all active:scale-95 focus:outline-none";
                    btn.innerText = getSafePinyin(oc);
                }
                btn.onclick = () => this.handleQuizAnswer(oc === target, btn);
                container.appendChild(btn);
            });

            this.playAudio();
            const charBox = document.getElementById('quiz-char').parentElement;
            charBox.classList.remove('bounce-in'); void charBox.offsetWidth; charBox.classList.add('bounce-in');
        },

        handleQuizAnswer(correct, btn) {
            if (correct) {
                this.score += 10;
                btn.classList.add('bg-green-100', 'border-green-500');
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                document.getElementById('quiz-options').querySelectorAll('button').forEach(b => b.disabled = true);
                setTimeout(() => { this.currentIndex++; this.renderQuizQuestion(); }, 1000);
            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-400');
                setTimeout(() => btn.classList.remove('shake'), 400);
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance("再想想哦");
                    u.lang = 'zh-CN'; u.rate = 1.2; window.speechSynthesis.speak(u);
                }
            }
        },

        showSuccess(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-success').classList.remove('hidden');
            this.sendEmailReport(false);
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        },

        // ---- 邮件状态展示 ----
        showEmailStatus(type, msg) {
            const el = document.getElementById('email-status');
            el.className = 'text-sm font-bold text-center py-2 px-3 rounded-xl whitespace-pre-wrap';
            if (type === 'loading') { el.classList.add('bg-yellow-100', 'text-yellow-700'); }
            else if (type === 'success') { el.classList.add('bg-green-100', 'text-green-700'); }
            else { el.classList.add('bg-red-100', 'text-red-700'); }
            el.innerText = msg;
            el.classList.remove('hidden');
            if (type !== 'loading') setTimeout(() => el.classList.add('hidden'), 10000);
        },

        // ---- 手动测试发送 ----
        async testEmail() {
            this.currentMode = 'test';
            this.chars = ['测','试','邮','件'];
            const btn = document.getElementById('btn-test-email');
            
            btn.disabled = true;
            btn.innerText = "⏳ 正在发信中...";
            this.showEmailStatus('loading', '⏳ 正在尝试多种通道发送，请稍候...');

            const result = await emailSender.send(this.currentMode, this.chars, 0, 0);

            btn.disabled = false;
            btn.innerText = "✉️ 测试发送邮件";

            if (result.ok) {
                console.log("✅ 邮件发送成功，策略：" + result.strategy);
                let extraHint = result.strategy.includes("FormSubmit") 
                    ? "\n⚠️ 提示: 首次使用 FormSubmit，需要您去 QQ 邮箱点开一封名为 'Action Required' 的邮件并点击 'Activate' 激活。激活后以后都会直接发信！"
                    : "";
                this.showEmailStatus('success', `✅ 发送成功！通道：${result.strategy}\n请去 QQ 邮箱检查(含垃圾箱)。${extraHint}`);
            } else {
                console.error("❌ 邮件发送失败：", result.error);
                this.showEmailStatus('error', `❌ 发送失败！\n${result.error}`);
            }
        },

        // 供正常通关调用的静默发信
        async sendEmailReport() {
            await emailSender.send(this.currentMode, this.chars, this.score, this.quizSequence ? this.quizSequence.length : 0);
        }
    };

    // 严密容错：即使应用出错也不白屏
    window.onload = () => {
        try {
            app.init();
        } catch (e) {
            console.error(e);
        }
    };
    </script>
</body>
</html>
