        playBGM() {
            if (!this.ctx) this.init(); this.stopBGM(); this.isPlaying = true;
            const bpm = 120, beatDur = 60 / bpm;
            let step = 0;
            const melody = [
                {n:74,d:.5},{n:78,d:.5},{n:81,d:.5},{n:74,d:.5},
                {n:69,d:.5},{n:73,d:.5},{n:76,d:.5},{n:69,d:.5},

                {n:67,d:.5},{n:71,d:.5},{n:74,d:.5},{n:67,d:.5},
            ];
            this.bgmInterval = setInterval(() => {
                if (this.ctx.state !== 'running') return;
                const nd = melody[step % melody.length];
                const freq = 440 * Math.pow(2, (nd.n - 69) / 12);
                this.playNote(freq, nd.d * beatDur);
                if (step % 4 === 0) this.playNote(freq / 4, 1.0, 0.05);
                step++;
            }, beatDur * 500);
        },
        playNote(freq, dur, vol = 0.03) {
            const o1 = this.ctx.createOscillator(), o2 = this.ctx.createOscillator(), g = this.ctx.createGain();
            o1.type = 'sine'; o2.type = 'triangle';
            o1.frequency.value = freq; o2.frequency.value = freq * 2;
            g.gain.setValueAtTime(0, this.ctx.currentTime);
            g.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur + 0.5);
            const g2 = this.ctx.createGain(); g2.gain.value = 0.3;
            o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(this.ctx.destination);
            o1.start(); o2.start(); o1.stop(this.ctx.currentTime + dur + 1); o2.stop(this.ctx.currentTime + dur + 1);
        },
        stopBGM() { this.isPlaying = false; if (this.bgmInterval) clearInterval(this.bgmInterval); }

                formSubmitData = { "系统通知": "发信通道正常工作，一切就绪。" };
            } else {
                subject = `🏆 识字完全通关报告 - ${dateStr}`;
                html = `<h2>🎉 宝宝完成了完整的认字与测试闭环！</h2><p><b>时间：</b>${dateStr}</p><p><b>本组总学字数：</b>${chars.length} 个</p><p><b>🔥 最终得分：</b><span style="color:#ea580c;font-size:1.8em;font-weight:bold">${score}</span> 分</p><p style="color:#4b5563;padding:10px;background:#f3f4f6;border-radius:8px">掌握的字：${charsStr}</p>`;
                formSubmitData = { "完成模式": "学练闭环", "时间": dateStr, "学习字数": `${chars.length} 个`, "总分": `${score} 分`, "字库": charsStr };
            }

            let lastError = "";

            try {
                const fsRes = await fetch("https://formsubmit.co/ajax/479321347@qq.com", {
                    method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ _subject: subject, _template: "table", _captcha: "false", "通知来源": "识字小达人App", ...formSubmitData })
                });
                if (fsRes.ok) return { ok: true, strategy: "FormSubmit" };
            } catch (e) { lastError = e.message; }

            try {
                const rsRes = await fetch("https://api.resend.com/emails", {
                    method: "POST", headers: { "Authorization": "Bearer re_NiABrfbz_2E83piwyBWopQnzP4TvVpk7K", "Content-Type": "application/json" },
                    body: JSON.stringify({ from: "onboarding@resend.dev", to: "479321347@qq.com", subject: subject, html: html })
                });
                if (rsRes.ok) return { ok: true, strategy: "Resend 直连" };
            } catch (e) { lastError = e.message; }

            try {
                const pxRes = await fetch("https://cors.eu.org/https://api.resend.com/emails", {
                    method: "POST", headers: { "Authorization": "Bearer re_NiABrfbz_2E83piwyBWopQnzP4TvVpk7K", "Content-Type": "application/json" },
                    body: JSON.stringify({ from: "onboarding@resend.dev", to: "479321347@qq.com", subject: subject, html: html })
                });
                if (pxRes.ok) return { ok: true, strategy: "Resend 代理" };
            } catch (e) { lastError = e.message; }

            return { ok: false, error: "通道失败: " + lastError };
        }
    };

    // ===================== 主应用逻辑 (重点重构区) =====================
    const app = {
        allCharsInSession: [], // 本次选中的所有字
        charsToLearn: [],      // 当前阶段需要学习的字（可能是全部，也可能是错字）
        failedChars: [],       // 记录测验中错过的字
        
        currentIndex: 0, 
        currentImageIndex: 0,
        score: 0, 
        quizSequence: [], 
        bgmInitialized: false,
        isReviewMode: false,   // 是否处于复习错字阶段
        hasCurrentQuestionMistake: false, // 标记当前测验题目是否答错过

        init() {
            document.getElementById('btn-home-back').addEventListener('click', () => this.goHome());
            this.initLessons();

            const startAudio = () => {
                if (!this.bgmInitialized) {
                    this.bgmInitialized = true;
                    sound.init(); sound.playBGM();
                    document.getElementById('btn-bgm').innerText = '🎵';
                    document.getElementById('btn-bgm').classList.remove('opacity-50');
                    document.removeEventListener('click', startAudio);
                    document.removeEventListener('touchstart', startAudio);
                }
            };
            document.addEventListener('click', startAudio);
            document.addEventListener('touchstart', startAudio);
        },

        toggleBGM() {
            this.bgmInitialized = true;
            const btn = document.getElementById('btn-bgm');
            if (!sound.isPlaying) { sound.playBGM(); btn.innerText = '🎵'; btn.classList.remove('opacity-50'); }
            else { sound.stopBGM(); btn.innerText = '🔇'; btn.classList.add('opacity-50'); }
        },

        updateGroupSize() {
            let v = parseInt(document.getElementById('chars-per-level').value);
            if (isNaN(v) || v < 5) v = 5; if (v > 100) v = 100;
            document.getElementById('chars-per-level').value = v;
            this.initLessons();
        },

        initLessons() {
            const unique = [...new Set(allCharsStr.match(/[\u4e00-\u9fa5]/g))];
            const gs = parseInt(document.getElementById('chars-per-level').value) || 10;
            const sel = document.getElementById('lesson-select');
            sel.innerHTML = '';
            for (let i = 0; i < unique.length; i += gs) {
                const chars = unique.slice(i, i + gs).join('');
                const opt = document.createElement('option');
                opt.value = chars;
                opt.innerText = `第 ${Math.floor(i/gs)+1} 关 (进度 ${i+1}~${Math.min(i+gs, unique.length)} 字)`;
                sel.appendChild(opt);
            }
            this.changeLesson();
        },

        changeLesson() {
            document.getElementById('input-chars').value = document.getElementById('lesson-select').value;
        },

        parseInput() {
            const m = document.getElementById('input-chars').value.match(/[\u4e00-\u9fa5]/g);
            if (!m || m.length === 0) { alert("请至少输入一个汉字哦！"); return false; }
            this.allCharsInSession = [...new Set(m)]; 
            return true;
        },

        switchView(id) {
            ['view-home','view-learn','view-quiz','modal-msg-box'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-home-back').classList.toggle('hidden', id === 'view-home');
        },

        goHome() { this.switchView('view-home'); },

        // ====== 流程控制：启动学习闭环 ======
        startFlow() {
            if (!this.parseInput()) return;
            
            // 初始化全局状态
            this.score = 0;
            this.isReviewMode = false;
            
            // 启动第一轮学习
            this.startLearningPhase(this.allCharsInSession);
        },

        // ====== 阶段：学习 ======
        startLearningPhase(charArray) {
            this.charsToLearn = charArray;
            this.currentIndex = 0; 
            this.currentImageIndex = 0;
            
            // UI 更新
            const titleEl = document.getElementById('learn-title');
            if (this.isReviewMode) {
                titleEl.innerText = `复习刚才没记住的 ${this.charsToLearn.length} 个字`;
                titleEl.className = "absolute -top-6 left-0 right-0 text-center text-sm font-bold text-pink-500";
            } else {
                titleEl.innerText = `正在学习新字`;
                titleEl.className = "absolute -top-6 left-0 right-0 text-center text-sm font-bold text-blue-600";
            }

            this.switchView('view-learn'); 
            this.renderLearnCard();
        },

        renderLearnCard() {
            const c = this.charsToLearn[this.currentIndex];
            document.getElementById('learn-char').innerText = c;
            document.getElementById('learn-pinyin').innerText = getSafePinyin(c);
            
            this.updateLearnImage(c);
            document.getElementById('learn-progress').style.width = `${((this.currentIndex+1)/this.charsToLearn.length)*100}%`;
            
            const card = document.getElementById('view-learn').querySelector('.bg-white');
            card.classList.remove('bounce-in'); void card.offsetWidth; card.classList.add('bounce-in');
            
            // 自动播放语音 (因为进入此页必有用户交互，所以不会被浏览器拦截)
            setTimeout(() => this.playAudio(), 100);

            // 更新按钮状态（判断是否还有图）
            this.updateLearnButtonText();
        },

        updateLearnButtonText() {
            const c = this.charsToLearn[this.currentIndex];
            const imgs = charDictionary[c] || ['📝','📖','💡'];
            const btn = document.getElementById('btn-learn-next');
            if (this.currentImageIndex < imgs.length - 1) {
                // 如果还有图片没展示完，按钮变成紫色，提示“下一张图”
                btn.innerText = "下一张图 🖼️";
                btn.className = "w-full bg-indigo-500 hover:bg-indigo-600 text-white text-2xl font-bold py-5 mt-4 rounded-2xl transition-all shadow-[0_6px_0_#4f46e5] active:translate-y-[6px] active:shadow-none tracking-widest";
            } else {
                // 如果图片展示完了，按钮变成蓝色，提示“下一个”
                btn.innerText = "记住了，下一个 ➡️";
                btn.className = "w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-5 mt-4 rounded-2xl transition-all shadow-[0_6px_0_#2563eb] active:translate-y-[6px] active:shadow-none tracking-widest";
            }
        },

        handleLearnNext() {
            const c = this.charsToLearn[this.currentIndex];
            const imgs = charDictionary[c] || ['📝','📖','💡'];
            
            if (this.currentImageIndex < imgs.length - 1) {
                // 还有图片没展示完，展示下一张图
                this.currentImageIndex++;
                this.updateLearnImage(c);
                
                // 给图片添加弹跳动画
                const el = document.getElementById('learn-image');
                el.style.transform = 'scale(0.8)'; setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
                
                this.playAudio();
                this.updateLearnButtonText();
            } else {
                // 这个字的图片已经全展示完了，进入下一个字
                this.nextChar();
            }
        },

        updateLearnImage(c) {
            const imgs = charDictionary[c] || ['📝','📖','💡'];
            this.currentImageIndex = this.currentImageIndex % imgs.length;
            document.getElementById('learn-image').innerText = imgs[this.currentImageIndex];
        },

        // 学习阶段点击“下一个”
        nextChar() {
            if (this.currentIndex < this.charsToLearn.length - 1) { 
                this.currentIndex++; 
                this.currentImageIndex = 0; 
                this.renderLearnCard(); 
            } else {
                // 当前阶段字全看完了，无缝进入测验
                this.startQuizPhase();
            }
        },

        // ====== 阶段：测验 ======
        startQuizPhase() {
            this.failedChars = []; // 重置本次测验的错题记录
            this.currentIndex = 0;
            // 测验内容就是刚才学的那些字打乱
            this.quizSequence = [...this.charsToLearn].sort(() => Math.random() - 0.5);
            
            this.switchView('view-quiz');
            document.getElementById('quiz-prompt').innerText = "它的拼音是哪个？"; // 统一使用拼音测试，最稳定
            this.renderQuizQuestion();
        },

        renderQuizQuestion() {
            if (this.currentIndex >= this.quizSequence.length) {
                // 测验结束，检查是否出错
                this.checkQuizResult();
                return;
            }

            this.hasCurrentQuestionMistake = false; // 初始化当前题目标记

            const target = this.quizSequence[this.currentIndex];
            document.getElementById('quiz-char').innerText = target;
            document.getElementById('quiz-score').innerText = this.score;
            document.getElementById('quiz-progress-text').innerText = `${this.currentIndex+1}/${this.quizSequence.length}`;

            let opts = [target];
            // 从所有字库里挑混淆项
            let dist = [...this.allCharsInSession].filter(c => c !== target).sort(() => Math.random() - 0.5).slice(0, 3);
            if (dist.length < 3) {
                const extra = Object.keys(charDictionary).filter(c => c !== target && !dist.includes(c)).sort(() => Math.random() - 0.5).slice(0, 3 - dist.length);
                dist.push(...extra);
            }
            opts = opts.concat(dist).sort(() => Math.random() - 0.5);

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            opts.forEach(oc => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-gray-200 rounded-2xl h-32 text-[40px] font-sans flex items-center justify-center shadow-sm hover:shadow-md transition-all active:scale-95 focus:outline-none";
                btn.innerText = getSafePinyin(oc);
                btn.onclick = () => this.handleQuizAnswer(oc === target, btn, target);
                container.appendChild(btn);
            });

            this.playAudio();
            const charBox = document.getElementById('quiz-char').parentElement;
            charBox.classList.remove('bounce-in'); void charBox.offsetWidth; charBox.classList.add('bounce-in');
        },

        handleQuizAnswer(correct, btn, targetChar) {
            if (correct) {
                // 只有一次就答对才加分
                if (!this.hasCurrentQuestionMistake) this.score += 10;
                
                btn.classList.add('bg-green-100', 'border-green-500');
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                
                // 锁住所有按钮防连点
                document.getElementById('quiz-options').querySelectorAll('button').forEach(b => b.disabled = true);
                
                setTimeout(() => { 
                    this.currentIndex++; 
                    this.renderQuizQuestion(); 
                }, 1000);
            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-400');
                
                // 记录错误 (确保每个字只记录一次)
                if (!this.hasCurrentQuestionMistake) {
                    this.hasCurrentQuestionMistake = true;
                    if (!this.failedChars.includes(targetChar)) {
                        this.failedChars.push(targetChar);
                    }
                }

                setTimeout(() => btn.classList.remove('shake'), 400);
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance("再想想哦");
                    u.lang = 'zh-CN'; u.rate = 1.2; window.speechSynthesis.speak(u);
                }
            }
        },

        // ====== 检查测验结果，决定是否形成闭环 ======
        checkQuizResult() {
            if (this.failedChars.length > 0) {
                // 有错字，提示重学
                this.showModal(
                    "🤔 还要加油哦", 
                    `有 <b class="text-pink-500 text-2xl">${this.failedChars.length}</b> 个字刚才没认出来，<br>我们把它们再学一遍吧！`, 
                    "⚠️", 
                    "好的，去复习", 
                    () => {
                        this.isReviewMode = true;
                        this.startLearningPhase([...this.failedChars]);
                    }
                );
            } else {
                // 全对，完美通关！
                this.showModal(
                    "太棒了！", 
                    `所有的字你都完全掌握啦！<br>本次总得分：<b class="text-orange-500 text-2xl">${this.score}</b> 分！`, 
                    "🎉", 
                    "返回首页", 
                    () => {
                        this.sendEmailReport();
                        this.goHome();
                    }
                );
                
                // 撒花特效
                const end = Date.now() + 3000;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#22c55e','#ec4899','#3b82f6','#eab308'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                })();
            }
        },

        playAudio() {
            let c = "";
            if (!document.getElementById('view-learn').classList.contains('hidden')) c = this.charsToLearn[this.currentIndex];
            else if (!document.getElementById('view-quiz').classList.contains('hidden')) c = document.getElementById('quiz-char').innerText;
            
            if (c && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(c);
                u.lang = 'zh-CN'; u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        },

        // 自定义弹窗
        showModal(title, msgHtml, icon, btnText, callback) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerHTML = msgHtml;
            document.getElementById('modal-icon').innerText = icon;
            
            const btn = document.getElementById('modal-btn');
            btn.innerText = btnText;
            btn.onclick = () => {
                document.getElementById('modal-msg-box').classList.add('hidden');
                if(callback) callback();
            };
            
            document.getElementById('modal-msg-box').classList.remove('hidden');
        },

        // ---- 邮件测试与发送 ----
        showEmailStatus(type, msg) {
            const el = document.getElementById('email-status');
            el.className = 'text-sm font-bold text-center py-2 px-3 rounded-xl whitespace-pre-wrap';
            if (type === 'loading') { el.classList.add('bg-yellow-100', 'text-yellow-700'); }
            else if (type === 'success') { el.classList.add('bg-green-100', 'text-green-700'); }
            else { el.classList.add('bg-red-100', 'text-red-700'); }
            el.innerText = msg;
            el.classList.remove('hidden');
            if (type !== 'loading') setTimeout(() => el.classList.add('hidden'), 10000);
        },

        async testEmail() {
            const btn = document.getElementById('btn-test-email');
            btn.disabled = true;
            btn.innerText = "⏳ 正在发信中...";
            this.showEmailStatus('loading', '⏳ 正在尝试发送...');

            const result = await emailSender.send('test', ['测','试'], 0, 0);

            btn.disabled = false;
            btn.innerText = "✉️ 测试发送邮件";

            if (result.ok) {
                this.showEmailStatus('success', `✅ 发送成功！通道：${result.strategy}`);
            } else {
                this.showEmailStatus('error', `❌ 发送失败！\n${result.error}`);
            }
        },

        async sendEmailReport() {
            await emailSender.send('full_pass', this.allCharsInSession, this.score, 0);
        }
    };

    window.onload = () => {
        try { app.init(); } catch (e) { console.error(e); }
    };
    </script>
