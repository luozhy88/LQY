<script>
const sound = {
    ctx:null, bgmInterval:null, isPlaying:false,
    init(){ if(!this.ctx) this.ctx=new(window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); },
    playBGM(){
        if(!this.ctx) this.init(); this.stopBGM(); this.isPlaying=true;
        const bd=0.5; let step=0;
        const mel=[74,78,81,74,69,73,76,69,71,74,78,71,67,71,74,67];
        this.bgmInterval=setInterval(()=>{
            if(this.ctx.state!=='running') return;
            const freq=440*Math.pow(2,(mel[step%mel.length]-69)/12);
            this.playNote(freq,bd*0.5);
            if(step%4===0) this.playNote(freq/4,1.0,0.04);
            step++;
        },bd*500);
    },
    playNote(freq,dur,vol=0.025){
        const o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type='sine'; o.frequency.value=freq;
        g.gain.setValueAtTime(0,this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(vol,this.ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur+0.4);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime+dur+0.5);
    },
    stopBGM(){ this.isPlaying=false; if(this.bgmInterval) clearInterval(this.bgmInterval); }
};

function getSafePinyin(c){
    try{ if(typeof pinyinPro!=='undefined'&&pinyinPro.pinyin) return pinyinPro.pinyin(c,{toneType:'symbol'}); }catch(e){}
    return "";
}
function getContentForChar(c){ return D[c]||[c+'字','含'+c+'词组','学'+c+'字']; }

// 渲染一个展示项（Emoji 或文字）
function renderDisplayItem(str, el, isLarge=true){
    el.innerHTML='';
    el.className='slide-in-right select-none flex items-center justify-center w-full h-full';
    // 判断是否是纯 Emoji（通过 unicode 范围粗判）
    const emojiRe=/^\p{Emoji}/u;
    const isEmoji = emojiRe.test(str) && str.replace(/[\p{Emoji}\uFE0F\u200D\s]/gu,'').length===0;
    
    if(isEmoji){
        el.style.fontSize = isLarge ? 'clamp(4rem,16vh,7rem)' : 'clamp(3rem,12vh,5rem)';
        el.innerText = str;
    } else {
        // 纯文字：组词/描述
        el.style.fontSize = str.length<=2 ? 'clamp(3rem,11vh,5rem)' : 'clamp(2rem,7vh,3.5rem)';
        el.innerText = str;
    }
}

const app={
    allCharsInSession:[], charsToLearn:[], failedChars:[],
    currentIndex:0, currentStep:0, score:0,
    quizSequence:[], currentQuizMode:'image',
    bgmInitialized:false, isReviewMode:false, hasCurrentQuestionMistake:false,

    init(){
        document.getElementById('btn-home-back').addEventListener('click',()=>this.goHome());
        this.initLessons();
        const startAudio=()=>{
            if(!this.bgmInitialized){
                this.bgmInitialized=true; sound.init(); sound.playBGM();
                const b=document.getElementById('btn-bgm'); b.innerText='🎵'; b.classList.remove('opacity-50');
                document.removeEventListener('click',startAudio); document.removeEventListener('touchstart',startAudio);
            }
        };
        document.addEventListener('click',startAudio); document.addEventListener('touchstart',startAudio);
        ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange']
            .forEach(e=>document.addEventListener(e,()=>this.updateFullscreenBtn()));
    },

    toggleFullscreen(){
        const d=document,el=d.documentElement;
        const req=el.requestFullscreen||el.mozRequestFullScreen||el.webkitRequestFullScreen||el.msRequestFullscreen;
        const ex=d.exitFullscreen||d.mozCancelFullScreen||d.webkitExitFullscreen||d.msExitFullscreen;
        (!d.fullscreenElement&&!d.mozFullScreenElement&&!d.webkitFullscreenElement&&!d.msFullscreenElement)
            ? req&&req.call(el) : ex&&ex.call(d);
    },

    updateFullscreenBtn(){
        const btn=document.getElementById('btn-fullscreen');
        const isFull=document.fullscreenElement||document.mozFullScreenElement||document.webkitFullscreenElement||document.msFullscreenElement;
        btn.innerText=isFull?'↙️':'⛶';
        const c=document.getElementById('app-container'),b=document.getElementById('app-body');
        if(isFull){ c.classList.remove('sm:rounded-3xl'); c.classList.add('rounded-none'); b.classList.remove('sm:p-4'); b.classList.add('p-0'); }
        else{ c.classList.add('sm:rounded-3xl'); c.classList.remove('rounded-none'); b.classList.add('sm:p-4'); b.classList.remove('p-0'); }
    },

    toggleBGM(){
        this.bgmInitialized=true;
        const btn=document.getElementById('btn-bgm');
        if(!sound.isPlaying){ sound.playBGM(); btn.innerText='🎵'; btn.classList.remove('opacity-50'); }
        else{ sound.stopBGM(); btn.innerText='🔇'; btn.classList.add('opacity-50'); }
    },

    updateGroupSize(){
        let v=parseInt(document.getElementById('chars-per-level').value);
        if(isNaN(v)||v<5) v=5; if(v>100) v=100;
        document.getElementById('chars-per-level').value=v; this.initLessons();
    },

    initLessons(){
        const unique=[...new Set(allCharsStr.match(/[\u4e00-\u9fa5]/g))];
        const gs=parseInt(document.getElementById('chars-per-level').value)||5;
        const sel=document.getElementById('lesson-select'); sel.innerHTML='';
        for(let i=0;i<unique.length;i+=gs){
            const chars=unique.slice(i,i+gs).join('');
            const opt=document.createElement('option');
            opt.value=chars; opt.innerText=`第${Math.floor(i/gs)+1}关（第${i+1}~${Math.min(i+gs,unique.length)}字）`;
            sel.appendChild(opt);
        }
        this.changeLesson();
    },

    changeLesson(){ document.getElementById('input-chars').value=document.getElementById('lesson-select').value; },

    parseInput(){
        const m=document.getElementById('input-chars').value.match(/[\u4e00-\u9fa5]/g);
        if(!m||m.length===0){ alert("请至少输入一个汉字哦！"); return false; }
        this.allCharsInSession=[...new Set(m)]; return true;
    },

    switchView(id){
        ['view-home','view-learn','view-quiz','modal-msg-box'].forEach(v=>document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-home-back').classList.toggle('hidden',id==='view-home');
    },

    goHome(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); this.switchView('view-home'); },
    startFlow(){ if(!this.parseInput()) return; this.score=0; this.isReviewMode=false; this.startLearningPhase(this.allCharsInSession); },

    startLearningPhase(arr){
        this.charsToLearn=arr; this.currentIndex=0;
        const t=document.getElementById('learn-title');
        if(this.isReviewMode){ t.innerText=`复习刚才没记住的 ${arr.length} 个字`; t.className='absolute -top-5 sm:-top-6 left-0 right-0 text-center text-xs sm:text-sm font-bold text-pink-500'; }
        else{ t.innerText='正在学习新字'; t.className='absolute -top-5 sm:-top-6 left-0 right-0 text-center text-xs sm:text-sm font-bold text-blue-600'; }
        this.switchView('view-learn'); this.renderLearnCard();
    },

    renderLearnCard(){
        const c=this.charsToLearn[this.currentIndex];
        this.currentStep=0;
        document.getElementById('learn-char').innerText=c;
        document.getElementById('learn-pinyin').innerText=getSafePinyin(c);
        this.updateLearnImage(c); this.updateLearnButtonText();
        document.getElementById('learn-progress').style.width=`${((this.currentIndex+1)/this.charsToLearn.length)*100}%`;
        const card=document.getElementById('view-learn').querySelector('.bg-white');
        card.classList.remove('bounce-in'); void card.offsetWidth; card.classList.add('bounce-in');
        setTimeout(()=>this.playAudio(),100);
    },

    updateLearnImage(c){
        const contents=getContentForChar(c);
        const el=document.getElementById('learn-image');
        el.classList.remove('slide-in-right'); void el.offsetWidth;
        const disp=contents[this.currentStep%contents.length];
        renderDisplayItem(disp, el, true);
        el.classList.add('slide-in-right');
    },

    updateLearnButtonText(){
        const c=this.charsToLearn[this.currentIndex];
        const contents=getContentForChar(c);
        const btn=document.getElementById('btn-learn-next');
        if(this.currentStep<contents.length-1){
            btn.innerText=`下一个演示（${this.currentStep+1}/${contents.length}）`;
            btn.className='w-full bg-indigo-500 hover:bg-indigo-600 text-white text-sm sm:text-base md:text-lg font-bold py-2 sm:py-3 mt-2 rounded-xl transition-all shadow-[0_4px_0_#4f46e5] active:translate-y-[4px] active:shadow-none shrink-0';
        } else {
            btn.innerText='记住了，下一个 ➡️';
            btn.className='w-full bg-blue-500 hover:bg-blue-600 text-white text-sm sm:text-base md:text-lg font-bold py-2 sm:py-3 mt-2 rounded-xl transition-all shadow-[0_4px_0_#2563eb] active:translate-y-[4px] active:shadow-none shrink-0';
        }
    },

    handleLearnNext(){
        const c=this.charsToLearn[this.currentIndex];
        const contents=getContentForChar(c);
        if(this.currentStep<contents.length-1){ this.currentStep++; this.updateLearnImage(c); this.updateLearnButtonText(); this.playAudio(); }
        else{ this.nextChar(); }
    },

    nextChar(){ if(this.currentIndex<this.charsToLearn.length-1){ this.currentIndex++; this.renderLearnCard(); } else{ this.startQuizPhase(); } },

    startQuizPhase(){
        this.failedChars=[]; this.currentIndex=0;
        this.quizSequence=[...this.charsToLearn].sort(()=>Math.random()-0.5);
        this.currentQuizMode=document.getElementById('quiz-mode-select').value;
        this.switchView('view-quiz');
        document.getElementById('quiz-prompt').innerText=this.currentQuizMode==='pinyin'?'它的拼音是哪个？':'哪一个是它？';
        this.renderQuizQuestion();
    },

    renderQuizQuestion(){
        if(this.currentIndex>=this.quizSequence.length){ this.checkQuizResult(); return; }
        this.hasCurrentQuestionMistake=false;
        const target=this.quizSequence[this.currentIndex];
        document.getElementById('quiz-char').innerText=target;
        document.getElementById('quiz-score').innerText=this.score;
        document.getElementById('quiz-progress-text').innerText=`${this.currentIndex+1}/${this.quizSequence.length}`;

        let targetAnswer;
        if(this.currentQuizMode==='pinyin'){ targetAnswer=getSafePinyin(target); }
        else{ const tc=getContentForChar(target); targetAnswer=tc[Math.floor(Math.random()*tc.length)]; }

        let used=new Set([targetAnswer]);
        let opts=[{content:targetAnswer,isTarget:true}];

        const getDistinct=(char)=>{
            if(this.currentQuizMode==='pinyin'){
                const py=getSafePinyin(char); return(!used.has(py)&&py!=='') ? py : null;
            } else {
                const cs=getContentForChar(char);
                for(const item of [...cs].sort(()=>Math.random()-0.5)) if(!used.has(item)) return item;
                return null;
            }
        };

        const avail=[...new Set([...this.allCharsInSession,...Object.keys(D)])]
            .filter(c=>c!==target).sort(()=>Math.random()-0.5);
        for(const char of avail){ if(opts.length>=4) break; const item=getDistinct(char); if(item){ used.add(item); opts.push({content:item,isTarget:false}); } }
        opts=opts.sort(()=>Math.random()-0.5);

        const container=document.getElementById('quiz-options'); container.innerHTML='';
        opts.forEach(opt=>{
            const btn=document.createElement('button');
            btn.className='bg-white border-2 border-gray-200 rounded-xl sm:rounded-2xl w-full h-full flex items-center justify-center shadow-sm hover:shadow-md hover:border-blue-300 transition-all active:scale-95 focus:outline-none overflow-hidden font-bold text-gray-700';
            if(this.currentQuizMode==='pinyin'){
                btn.innerText=opt.content; btn.classList.add('font-sans','tracking-widest');
                btn.style.fontSize='clamp(1.8rem,7vh,3rem)';
            } else {
                // 用 renderDisplayItem 逻辑直接设置
                const emojiRe=/^\p{Emoji}/u;
                const isEmoji=emojiRe.test(opt.content)&&opt.content.replace(/[\p{Emoji}\uFE0F\u200D\s]/gu,'').length===0;
                if(isEmoji){ btn.style.fontSize='clamp(3rem,11vh,5rem)'; btn.innerText=opt.content; }
                else{ btn.style.fontSize=opt.content.length<=2?'clamp(2.5rem,9vh,4rem)':'clamp(1.5rem,5.5vh,2.8rem)'; btn.innerText=opt.content; }
            }
            btn.onclick=()=>this.handleQuizAnswer(opt.isTarget,btn,target);
            container.appendChild(btn);
        });

        this.playAudio();
        const box=document.getElementById('quiz-char').parentElement;
        box.classList.remove('bounce-in'); void box.offsetWidth; box.classList.add('bounce-in');
    },

    handleQuizAnswer(correct,btn,targetChar){
        if(correct){
            if(!this.hasCurrentQuestionMistake) this.score+=10;
            btn.classList.add('bg-green-100','border-green-500');
            confetti({particleCount:60,spread:65,origin:{y:0.8},colors:['#22c55e','#ec4899','#3b82f6','#eab308']});
            document.getElementById('quiz-options').querySelectorAll('button').forEach(b=>b.disabled=true);
            setTimeout(()=>{ this.currentIndex++; this.renderQuizQuestion(); },900);
        } else {
            btn.classList.add('shake','bg-red-50','border-red-400');
            if(!this.hasCurrentQuestionMistake){ this.hasCurrentQuestionMistake=true; if(!this.failedChars.includes(targetChar)) this.failedChars.push(targetChar); }
            setTimeout(()=>btn.classList.remove('shake','bg-red-50','border-red-400'),400);
            if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance('再想想哦'); u.lang='zh-CN'; u.rate=1.2; window.speechSynthesis.speak(u); }
        }
    },

    checkQuizResult(){
        if(this.failedChars.length>0){
            this.showModal('🤔 还要加油哦',`有 <b class="text-pink-500 text-2xl">${this.failedChars.length}</b> 个字刚才没认出来，<br>我们把它们再学一遍吧！`,'⚠️','好的，去复习',()=>{ this.isReviewMode=true; this.startLearningPhase([...this.failedChars]); });
        } else {
            this.showModal('太棒了！',`所有的字都掌握啦！<br>本次总分：<b class="text-orange-500 text-2xl">${this.score}</b> 分！`,'🎉','返回首页',()=>this.goHome());
            const end=Date.now()+3000;
            (function f(){ confetti({particleCount:5,angle:60,spread:55,origin:{x:0}}); confetti({particleCount:5,angle:120,spread:55,origin:{x:1}}); if(Date.now()<end) requestAnimationFrame(f); })();
        }
    },

    playAudio(){
        let c='';
        if(!document.getElementById('view-learn').classList.contains('hidden')) c=this.charsToLearn[this.currentIndex];
        else if(!document.getElementById('view-quiz').classList.contains('hidden')) c=document.getElementById('quiz-char').innerText;
        if(c&&'speechSynthesis' in window){ window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(c); u.lang='zh-CN'; u.rate=0.8; window.speechSynthesis.speak(u); }
    },

    showModal(title,msgHtml,icon,btnText,cb){
        document.getElementById('modal-title').innerText=title;
        document.getElementById('modal-msg').innerHTML=msgHtml;
        document.getElementById('modal-icon').innerText=icon;
        const btn=document.getElementById('modal-btn');
        btn.innerText=btnText;
        btn.onclick=()=>{ document.getElementById('modal-msg-box').classList.add('hidden'); if(cb) cb(); };
        document.getElementById('modal-msg-box').classList.remove('hidden');
    }
};

window.onload=()=>{ try{ app.init(); }catch(e){ console.error(e); } };
</script>
