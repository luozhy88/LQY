<script>
const sound = {
    ctx:null, bgmInterval:null, isPlaying:false,
    init(){ if(!this.ctx) this.ctx=new(window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); },
    playBGM(){
        if(!this.ctx) this.init(); this.stopBGM(); this.isPlaying=true;
        const bd=0.5; let step=0;
        const mel=[74,78,81,74,69,73,76,69,71,74,78,71,67,71,74,67];
        this.bgmInterval=setInterval(()=>{
            if(this.ctx.state!=='running') return;
            const freq=440*Math.pow(2,(mel[step%mel.length]-69)/12);
            this.playNote(freq,bd*0.5);
            if(step%4===0) this.playNote(freq/4,1.0,0.04);
            step++;
        },bd*500);
    },
    playNote(freq,dur,vol=0.025){
        const o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type='sine'; o.frequency.value=freq;
        g.gain.setValueAtTime(0,this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(vol,this.ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur+0.4);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime+dur+0.5);
    },
    stopBGM(){ this.isPlaying=false; if(this.bgmInterval) clearInterval(this.bgmInterval); }
};

function getSafePinyin(c){
    try{ if(typeof pinyinPro!=='undefined'&&pinyinPro.pinyin) return pinyinPro.pinyin(c,{toneType:'symbol'}); }catch(e){}
    return "";
}

function isPureEmoji(str) {
    if (!str) return false;
    const emojiRe = /^\p{Emoji}/u;
    return emojiRe.test(str) && str.replace(/[\p{Emoji}\uFE0F\u200D\s]/gu, '').length === 0;
}

// 获取字/词对应的展示内容 (包含自动拆字逻辑)
function getContentForChar(c){ 
    if(D[c]) return D[c];
    if(c.length > 1) {
        // 如果是词语成语且没有内置图，则展示：词语本身 -> 第1个字 -> 第2个字 ...
        return [c, ...c.split('')];
    }
    return [c + '字', '含' + c + '词', '学' + c + '字']; 
}

function renderDisplayItem(str, el, isLarge=true){
    el.innerHTML='';
    el.className='slide-in-right select-none flex items-center justify-center w-full h-full transition-transform rounded-xl';
    
    const isEmoji = isPureEmoji(str);
    const hintEl = document.getElementById('learn-image-hint');

    if(isEmoji){
        el.style.fontSize = isLarge ? 'clamp(4rem,16vh,7rem)' : 'clamp(3rem,12vh,5rem)';
        el.innerText = str;
        el.onclick = null;
        el.classList.remove('cursor-pointer', 'active:scale-95', 'hover:bg-blue-50/50');
        if(hintEl) hintEl.classList.add('hidden');
    } else {
        // 自适应长文本大小
        let fSize = 'clamp(3rem,11vh,5rem)';
        if(str.length >= 4) fSize = 'clamp(1.5rem,6vh,3rem)';
        else if(str.length >= 2) fSize = 'clamp(2rem,8vh,4rem)';
        
        el.style.fontSize = fSize;
        el.innerText = str;
        el.classList.add('cursor-pointer', 'active:scale-95', 'hover:bg-blue-50/50', 'break-words-center');
        el.onclick = (e) => {
            e.stopPropagation();
            app.playWordAudio(str);
        };
        if(hintEl) hintEl.classList.remove('hidden');
    }
}

    toggleFullscreen(){
        const d=document,el=d.documentElement;
        const req=el.requestFullscreen||el.mozRequestFullScreen||el.webkitRequestFullScreen||el.msRequestFullscreen;
        const ex=d.exitFullscreen||d.mozCancelFullScreen||d.webkitExitFullscreen||d.msExitFullscreen;
        (!d.fullscreenElement&&!d.mozFullScreenElement&&!d.webkitFullscreenElement&&!d.msFullscreenElement)
            ? req&&req.call(el) : ex&&ex.call(d);
    },

    updateFullscreenBtn(){
        const btn=document.getElementById('btn-fullscreen');
        const isFull=document.fullscreenElement||document.mozFullScreenElement||document.webkitFullscreenElement||document.msFullscreenElement;
        btn.innerText=isFull?'↙️':'⛶';
        const c=document.getElementById('app-container'),b=document.getElementById('app-body');
        if(isFull){ c.classList.remove('sm:rounded-3xl'); c.classList.add('rounded-none'); b.classList.remove('sm:p-4'); b.classList.add('p-0'); }
        else{ c.classList.add('sm:rounded-3xl'); c.classList.remove('rounded-none'); b.classList.add('sm:p-4'); b.classList.remove('p-0'); }
    },

    toggleBGM(){
        this.bgmInitialized=true;
        const btn=document.getElementById('btn-bgm');
        if(!sound.isPlaying){ sound.playBGM(); btn.innerText='🎵'; btn.classList.remove('opacity-50'); }
        else{ sound.stopBGM(); btn.innerText='🔇'; btn.classList.add('opacity-50'); }
    },

    initLessons(){
        const unique=[...new Set(allCharsStr.match(/[\u4e00-\u9fa5]/g))];
        const val = document.getElementById('chars-per-level').value;
        let gs = val === 'all' ? unique.length : (parseInt(val) || 5);
        if(gs < 5 && val !== 'all') gs = 5;
        
        const sel=document.getElementById('lesson-select'); sel.innerHTML='';
        
        let optC=document.createElement('option');
        optC.value="清明 学生 花生 请安 多么 双人 古老 名言 一清二白 雨过天晴 自言自语";
        optC.innerText="🌟 自定义词汇与成语挑战";
        sel.appendChild(optC);

        // 原生单字生成（中间加空格以便兼容拆词逻辑）
        if (val === 'all') {
            const chars=unique.join(' ');
            const opt=document.createElement('option');
            opt.value=chars; opt.innerText=`基础字全部（共${unique.length}字）`;
            sel.appendChild(opt);
        } else {
            for(let i=0;i<unique.length;i+=gs){
                const chars=unique.slice(i,i+gs).join(' '); // 加空格支持分词
                const opt=document.createElement('option');
                opt.value=chars; opt.innerText=`基础字第${Math.floor(i/gs)+1}关（第${i+1}~${Math.min(i+gs,unique.length)}字）`;
                sel.appendChild(opt);
            }
        }
        this.changeLesson();
    },

    changeLesson(){ document.getElementById('input-chars').value=document.getElementById('lesson-select').value; },

    parseInput(){
        let text = document.getElementById('input-chars').value.trim();
        if(!text){ alert("请至少输入内容哦！"); return false; }
        
        // 核心支持词组：按空格、逗号、顿号、换行分隔
        let isWordMode = /[\s,，、\n]/.test(text);
        let arr = [];
        if (isWordMode) {
            arr = text.split(/[\s,，、\n]+/).filter(w => /^[\u4e00-\u9fa5]+$/.test(w));
        } else {
            // 兼容没有任何空格的老连续汉字输入
            arr = text.match(/[\u4e00-\u9fa5]/g) || [];
        }
        
        if(arr.length===0){ alert("没有检测到有效的汉字/词语！"); return false; }
        this.allCharsInSession=[...new Set(arr)]; return true;
    },

    switchView(id){
        ['view-home','view-learn','view-quiz','modal-msg-box'].forEach(v=>document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-home-back').classList.toggle('hidden',id==='view-home');
    },

    goHome(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); this.switchView('view-home'); },
    
    startFlow(){ 
        if(!this.parseInput()) return; 
        this.score=0; this.isReviewMode=false; 
        this.sessionMistakes.clear();
        this.currentQuizMode=document.getElementById('quiz-mode-select').value;
        
        if (this.currentQuizMode === 'pinyin2word' || this.currentQuizMode === 'pinyin') {
            this.charsToLearn = [...this.allCharsInSession];
            this.startQuizPhase();
        } else {
            this.startLearningPhase(this.allCharsInSession); 
        }
    },

    startLearningPhase(arr){
        this.charsToLearn=arr; this.currentIndex=0;
        this.switchView('view-learn'); this.renderLearnCard();
    },

    renderLearnCard(){
        const c=this.charsToLearn[this.currentIndex];
        this.currentStep=0;
        
        const t=document.getElementById('learn-title');
        const progressText = ` (${this.currentIndex+1}/${this.charsToLearn.length})`;
        if(this.isReviewMode){ 
            t.innerText=`复习没记住的词/字` + progressText; 
            t.className='absolute -top-5 sm:-top-6 left-0 right-0 text-center text-xs sm:text-sm font-bold text-pink-500'; 
        } else { 
            t.innerText=`正在学习新内容` + progressText; 
            t.className='absolute -top-5 sm:-top-6 left-0 right-0 text-center text-xs sm:text-sm font-bold text-blue-600'; 
        }

        // 自适应多字成语的字号
        const charLen = c.length;
        const rubyParent = document.getElementById('learn-char').parentElement;
        const rtEl = document.getElementById('learn-pinyin');
        
        if(charLen >= 4) {
            rubyParent.style.fontSize = 'clamp(1.5rem, 5vh, 2.5rem)';
            rtEl.style.fontSize = 'clamp(0.8rem, 2vh, 1rem)';
        } else if (charLen >= 2) {
            rubyParent.style.fontSize = 'clamp(2rem, 7vh, 3.5rem)';
            rtEl.style.fontSize = 'clamp(1rem, 2.5vh, 1.5rem)';
        } else {
            rubyParent.style.fontSize = 'clamp(3rem, 12vh, 5rem)';
            rtEl.style.fontSize = 'clamp(1.2rem, 3.5vh, 2rem)';
        }

        document.getElementById('learn-char').innerText=c;
        document.getElementById('learn-pinyin').innerText=getSafePinyin(c);
        
        this.updateLearnImage(c); this.updateLearnButtonText();
        document.getElementById('learn-progress').style.width=`${((this.currentIndex+1)/this.charsToLearn.length)*100}%`;
        
        const card=document.getElementById('view-learn').querySelector('.bg-white');
        card.classList.remove('bounce-in'); void card.offsetWidth; card.classList.add('bounce-in');
        setTimeout(()=>this.playAudio(),100);
    },

    updateLearnImage(c){
        const contents=getContentForChar(c);
        const el=document.getElementById('learn-image');
        el.classList.remove('slide-in-right'); void el.offsetWidth;
        const disp=contents[this.currentStep%contents.length];
        renderDisplayItem(disp, el, true);
        el.classList.add('slide-in-right');
    },

    updateLearnButtonText(){
        const c=this.charsToLearn[this.currentIndex];
        const contents=getContentForChar(c);
        const btn=document.getElementById('btn-learn-next');
        if(this.currentStep<contents.length-1){
            btn.innerText=`下一个拆解演示（${this.currentStep+1}/${contents.length}）`;
            btn.className='w-full bg-indigo-500 hover:bg-indigo-600 text-white text-sm sm:text-base md:text-lg font-bold py-2 sm:py-3 mt-2 rounded-xl transition-all shadow-[0_4px_0_#4f46e5] active:translate-y-[4px] active:shadow-none shrink-0';
        } else {
            btn.innerText='记住了，下一个 ➡️';
            btn.className='w-full bg-blue-500 hover:bg-blue-600 text-white text-sm sm:text-base md:text-lg font-bold py-2 sm:py-3 mt-2 rounded-xl transition-all shadow-[0_4px_0_#2563eb] active:translate-y-[4px] active:shadow-none shrink-0';
        }
    },

    handleLearnNext(){
        const c=this.charsToLearn[this.currentIndex];
        const contents=getContentForChar(c);
        if(this.currentStep<contents.length-1){ this.currentStep++; this.updateLearnImage(c); this.updateLearnButtonText(); this.playAudio(); }
        else{ this.nextChar(); }
    },

    nextChar(){ if(this.currentIndex<this.charsToLearn.length-1){ this.currentIndex++; this.renderLearnCard(); } else{ this.startQuizPhase(); } },

    startQuizPhase(){
        this.failedChars=[]; this.currentIndex=0;
        this.quizSequence=[...this.charsToLearn].sort(()=>Math.random()-0.5);
        this.currentQuizMode=document.getElementById('quiz-mode-select').value;
        this.switchView('view-quiz');
        
        const promptEl = document.getElementById('quiz-prompt');
        if(this.currentQuizMode === 'pinyin2word') promptEl.innerText = '拼音对应的是哪个字/词？';
        else if(this.currentQuizMode === 'pinyin') promptEl.innerText = '它的正确拼音是哪个？';
        else promptEl.innerText = '哪一个是它？';
        
        this.renderQuizQuestion();
    },

    renderQuizQuestion(){
        if(this.currentIndex>=this.quizSequence.length){ this.checkQuizResult(); return; }
        this.hasCurrentQuestionMistake=false;
        
        const target=this.quizSequence[this.currentIndex]; // 当前考核的字/词 (例如: "清水"或"清明")
        const quizCharEl = document.getElementById('quiz-char');
        document.getElementById('quiz-score').innerText=this.score;
        document.getElementById('quiz-progress-text').innerText=`${this.currentIndex+1}/${this.quizSequence.length}`;

        // ================= 1. 设置题目展示框的内容 =================
        let promptText = target;
        let promptSize = target.length > 3 ? 'clamp(1.5rem,5vh,2.5rem)' : 'clamp(2rem,6vh,4rem)';
        
        if (this.currentQuizMode === 'pinyin2word') {
            promptText = getSafePinyin(target);
            promptSize = promptText.length > 15 ? 'clamp(1rem,3vh,1.5rem)' : (promptText.length > 8 ? 'clamp(1.5rem,4vh,2rem)' : 'clamp(2rem,6vh,3rem)');
        }
        
        quizCharEl.innerText = promptText;
        quizCharEl.style.fontSize = promptSize;

        // ================= 2. 确定正确的答案展示项 =================
        let targetDisplay;
        if (this.currentQuizMode === 'pinyin') {
            targetDisplay = getSafePinyin(target);
        } else if (this.currentQuizMode === 'image') {
            const tc = getContentForChar(target);
            targetDisplay = tc[Math.floor(Math.random() * tc.length)];
        } else {
            targetDisplay = target;
        }

        let opts = [{ display: targetDisplay, originalText: target, isTarget: true }];
        let usedTexts = new Set([targetDisplay]);

        // ================= 3. 【核心算法】生成高强度混淆干扰词 =================
        let confusableWords = new Set();
        const chars = target.split('');
        
        // 策略 A: 基于字典的形近字/近音字替换 (比如: 清明 -> 晴明/请明)
        // 这种替换在转换成拼音模式时，会自动生成调号错误或前后鼻音错误的拼音选项！
        for (let i = 0; i < chars.length; i++) {
            const c = chars[i];
            if (CONFUSIONS[c]) {
                CONFUSIONS[c].forEach(alt => {
                    let newWord = [...chars];
                    newWord[i] = alt;
                    confusableWords.add(newWord.join(''));
                });
            }
        }
        
        // 策略 B: 同等长度的结构替换 (如果字典里没有足够的混淆字，用基础字库组装等长词)
        let attempts = 0;
        while (confusableWords.size < 15 && attempts < 50) {
            let newWord = [...chars];
            let replaceIdx = Math.floor(Math.random() * chars.length);
            let randomChar = allCharsStr[Math.floor(Math.random() * allCharsStr.length)];
            newWord[replaceIdx] = randomChar;
            confusableWords.add(newWord.join(''));
            attempts++;
        }

        // 获取学习池和全量字典中本身就等长的词语
        let basePool = [...new Set([...this.allCharsInSession, ...Object.keys(D)])].filter(c => c !== target);
        let sameLenPool = basePool.filter(c => c.length === target.length);
        
        // 组合混淆词库优先级：强混淆替换词 -> 本地同长度词 -> 其他长度备胎词
        let combinedWordPool = [...confusableWords, ...sameLenPool, ...basePool];
        
        // ================= 4. 将混淆词转化为界面的ABCD选项 =================
        for (const word of combinedWordPool) {
            if (opts.length >= 4) break;
            
            let distDisplay;
            if (this.currentQuizMode === 'pinyin') {
                distDisplay = getSafePinyin(word); 
                // 防止形近字发音一样导致出现了两个完全一样的正确拼音选项
                if(distDisplay === getSafePinyin(target)) continue; 
            } else if (this.currentQuizMode === 'image') {
                const cs = getContentForChar(word);
                distDisplay = isPureEmoji(cs[0]) ? cs[0] : word;
            } else {
                distDisplay = word;
            }

            if (distDisplay && !usedTexts.has(distDisplay)) {
                usedTexts.add(distDisplay);
                opts.push({ display: distDisplay, originalText: word });
            }
        }

        opts = opts.sort(() => Math.random() - 0.5);

        // ================= 5. 渲染选项到界面 =================
        const container=document.getElementById('quiz-options'); container.innerHTML='';
        opts.forEach(opt=>{
            const btn=document.createElement('button');
            btn.className='bg-white border-2 border-gray-200 rounded-xl sm:rounded-2xl w-full h-full flex items-center justify-center shadow-sm hover:shadow-md hover:border-blue-300 transition-all active:scale-95 focus:outline-none overflow-hidden font-bold text-gray-700 break-words-center';
            
            if(!isPureEmoji(opt.display)){
                btn.innerText=opt.display; 
                if(this.currentQuizMode === 'pinyin') btn.classList.add('font-sans','tracking-wider');
                
                let len = opt.display.length;
                if(len > 15) btn.style.fontSize = 'clamp(0.8rem, 2.5vh, 1.2rem)';
                else if(len > 8) btn.style.fontSize = 'clamp(1rem, 3vh, 1.5rem)';
                else if(len > 4) btn.style.fontSize = 'clamp(1.2rem, 4vh, 2rem)';
                else btn.style.fontSize = 'clamp(1.5rem, 5vh, 2.5rem)';

            } else {
                btn.innerText=opt.display; 
                btn.style.fontSize='clamp(3rem,11vh,5rem)'; 
            }
            
            btn.onclick=()=>this.handleQuizAnswer(opt.isTarget, btn, target, opt.originalText);
            container.appendChild(btn);
        });

        this.playAudio();
        const box=quizCharEl.parentElement;
        box.classList.remove('bounce-in'); void box.offsetWidth; box.classList.add('bounce-in');
    },

    playWordAudio(text) {
        if (!text) return false;
        if (!isPureEmoji(text) && 'speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
            return true;
        }
        return false;
    },

    handleQuizAnswer(correct, btn, targetChar, originalText){
        const isSpoken = this.playWordAudio(originalText);

        if(correct){
            if(!this.hasCurrentQuestionMistake) this.score+=10;
            btn.classList.add('bg-green-100','border-green-500');
            confetti({particleCount:60,spread:65,origin:{y:0.8},colors:['#22c55e','#ec4899','#3b82f6','#eab308']});
            document.getElementById('quiz-options').querySelectorAll('button').forEach(b=>b.disabled=true);
            setTimeout(()=>{ this.currentIndex++; this.renderQuizQuestion(); },900);
        } else {
            btn.classList.add('shake','bg-red-50','border-red-400');
            if(!this.hasCurrentQuestionMistake){ 
                this.hasCurrentQuestionMistake=true; 
                if(!this.failedChars.includes(targetChar)) this.failedChars.push(targetChar); 
                this.sessionMistakes.add(targetChar);
            }
            setTimeout(()=>btn.classList.remove('shake','bg-red-50','border-red-400'),400);
            
            if(!isSpoken && 'speechSynthesis' in window){ 
                const u=new SpeechSynthesisUtterance('再想想哦'); 
                u.lang='zh-CN'; u.rate=1.2; 
                window.speechSynthesis.speak(u); 
            }
        }
    },

    checkQuizResult(){
        if(this.failedChars.length>0){
            this.showModal('🤔 还要加油哦',`有 <b class="text-pink-500 text-2xl">${this.failedChars.length}</b> 个刚才没认出来，<br>我们把它们再复习一遍吧！`,'⚠️','好的，去复习',()=>{ 
                this.isReviewMode=true; 
                // 如果是拼音测验模式复习时，也跳过学习阶段直接测验
                if (this.currentQuizMode === 'pinyin2word' || this.currentQuizMode === 'pinyin') {
                    this.charsToLearn = [...this.failedChars];
                    this.startQuizPhase();
                } else {
                    this.startLearningPhase([...this.failedChars]); 
                }
            });
        } else {
            this.sendReport();
            this.showModal('太棒了！',`所有的内容都掌握啦！<br>本次总分：<b class="text-orange-500 text-2xl">${this.score}</b> 分！<br><span class="text-sm text-gray-400 mt-2 block">📧 学习报告已发送至家长邮箱</span>`,'🎉','返回首页',()=>this.goHome());
            const end=Date.now()+3000;
            (function f(){ confetti({particleCount:5,angle:60,spread:55,origin:{x:0}}); confetti({particleCount:5,angle:120,spread:55,origin:{x:1}}); if(Date.now()<end) requestAnimationFrame(f); })();
        }
    },

    sendReport(){
        const email = "479321347@qq.com";
        const modeNames = { 'pinyin2word': '看拼音找字/词', 'pinyin': '看字找拼音', 'image': '看字找图/词' };
        const modeText = modeNames[this.currentQuizMode] || this.currentQuizMode;
        const wordsLearned = this.allCharsInSession.join(', ');
        const mistakes = Array.from(this.sessionMistakes).join(', ') || '无（全对，太棒了！）';
        
        const data = {
            _subject: `📝 识字小达人 学习报告 - ${new Date().toLocaleDateString()}`,
            "测试模式": modeText,
            "本次学习内容": wordsLearned,
            "遇到困难的字词": mistakes,
            "最终得分": this.score,
            "完成时间": new Date().toLocaleString(),
            _template: "table"
        };

        fetch(`https://formsubmit.co/ajax/${email}`, {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => console.log("学习报告已发送:", data))
        .catch(err => console.error("发送报告失败:", err));
    },

    playAudio(){
        let c='';
        if(!document.getElementById('view-learn').classList.contains('hidden')){
            c=this.charsToLearn[this.currentIndex];
        } else if(!document.getElementById('view-quiz').classList.contains('hidden')){
            c=this.quizSequence[this.currentIndex]; 
        }
        
        if(c&&'speechSynthesis' in window){ 
            window.speechSynthesis.cancel(); 
            const u=new SpeechSynthesisUtterance(c); 
            u.lang='zh-CN'; u.rate=0.8; 
            window.speechSynthesis.speak(u); 
        }
    },

    showModal(title,msgHtml,icon,btnText,cb){
        document.getElementById('modal-title').innerText=title;
        document.getElementById('modal-msg').innerHTML=msgHtml;
        document.getElementById('modal-icon').innerText=icon;
        const btn=document.getElementById('modal-btn');
        btn.innerText=btnText;
        btn.onclick=()=>{ document.getElementById('modal-msg-box').classList.add('hidden'); if(cb) cb(); };
        document.getElementById('modal-msg-box').classList.remove('hidden');
    }
};

window.onload=()=>{ try{ app.init(); }catch(e){ console.error(e); } };
</script>
